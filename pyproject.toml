[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_projects"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Projects — funded research projects, active and past (public list/detail grouped by status + admin CRUD)"

[tool.splent.contract.provides]
routes     = ["/admin/projects", "/admin/projects/<int:project_id>/delete", "/admin/projects/<int:project_id>/edit", "/admin/projects/<int:project_id>/move", "/admin/projects/new", "/projects", "/projects/<slug>"]
blueprints = []
models     = ["Project"]
commands   = ["hello"]
hooks      = ["layout.authenticated_sidebar"]
services   = ["ProjectsService"]
signals    = []
translations = ["es"]
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["ProjectsService"]
templates = ["projects/admin/form.html", "projects/admin/list.html", "projects/detail.html", "projects/list.html"]
models    = ["Project"]
hooks     = ["layout.authenticated_sidebar"]
routes    = false
